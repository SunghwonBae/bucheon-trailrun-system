<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부천트라이 산악마라톤대회 관리자페이지</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <!-- Google Maps API: YOUR_API_KEY 부분을 실제 발급받은 키로 변경해야 지도가 보입니다. -->
    <!--<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAXNCrPrwPfVgDHDLiumDwjYbkpV7UGRDE&callback=initMap"></script>-->
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { cursor: pointer; background: #f8f9fa; border: 1px solid #ddd; padding: 10px; }
        th:hover { background: #e9ecef; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        input[type="text"], input[type="number"] { width: 90%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* 버튼 스타일 통일 */
        .btn { 
            padding: 10px 15px; border: none; border-radius: 5px; color: white; 
            cursor: pointer; font-size: 0.9rem; font-weight: bold; 
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-excel { background: #27ae60; }
        .btn-add { background: #16a085; }
        .btn-template { background: #34495e; }
        .btn-upload { background: #9b59b6; }
        .btn-reset { background: #e74c3c; }
        .btn-home { background: #2980b9; }
        .btn-cert { background: #f39c12; }
        #map { width: 100%; height: 400px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; }

        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.1rem; margin-bottom: 15px; }
            
            /* 컨트롤 패널 세로 정렬 */
            .controls { flex-direction: column; align-items: stretch; gap: 10px; }
            .controls > button, .controls > div { width: 100%; margin: 0; }
            .controls > div { 
                border-left: none !important; padding-left: 0 !important; 
                flex-direction: column; align-items: stretch; 
            }
            .controls input, .controls select, .controls label { width: 100%; box-sizing: border-box; margin: 5px 0; text-align: center; }
            
            /* 테이블 가로 스크롤 처리 */
            #runnerTable { display: block; overflow-x: auto; white-space: nowrap; }
            th, td { padding: 8px 5px; font-size: 0.9rem; }
            .btn { padding: 12px; font-size: 1rem; }
        }

        /* [추가] 커스텀 알림/모달 스타일 */
        .toast-message {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 25px;
            font-size: 1rem; z-index: 4000; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast-message.show { opacity: 1; }

        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        .custom-modal-box {
            background: white; padding: 25px; border-radius: 15px; width: 300px;
            text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .custom-modal-text { margin-bottom: 20px; font-size: 1.1rem; word-break: keep-all; }
        .custom-modal-btns { display: flex; gap: 10px; justify-content: center; }
        .custom-modal-btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-confirm-yes { background: #e74c3c; color: white; }
        .btn-confirm-no { background: #95a5a6; color: white; }
        .btn-alert-ok { background: #3498db; color: white; width: 100%; }

        /* [추가] 카운트다운 스타일 */
        .countdown-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 6000;
        }
        #countdownNumber {
            font-size: 15rem; color: #f1c40f; font-weight: bold;
            font-variant-numeric: tabular-nums;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* [추가] 지도 마커 라벨 스타일 (배경색 적용) */
        .runner-label {
            background-color: rgba(255, 255, 255, 0.9); /* 흰색 배경 (약간 투명) */
            border: 1px solid #3498db; /* 테두리 */
            border-radius: 4px; /* 둥근 모서리 */
            padding: 3px 6px; /* 내부 여백 */
            font-size: 12px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); /* 그림자 */
        }
    </style>
</head>
<body>
    <h1 id="raceTitle">🏃부천트라이 산악마라톤대회 관리자</h1>

    <div class="controls">
        <button class="btn btn-home" onclick="location.href='/'">🏠 전광판으로</button>
        <button class="btn btn-add" onclick="addNewRow()">➕ 선수추가</button>
        <button class="btn btn-excel" onclick="downloadExcel()">📊 전체목록 액셀다운로드</button>
        <button class="btn btn-template" onclick="downloadTemplate()">📥 업로드템플릿다운</button>
    
        <div style="border-left: 2px solid #ccc; padding-left: 15px; display: flex; align-items: center; gap: 10px;">
            <label for="excelFile" class="btn btn-upload">업로드파일 선택</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls" style="display: none;" onchange="uploadExcel(this)">
            <span id="fileName" style="font-size: 0.85rem; color: #666;">선택된 파일 없음</span>
        </div>
        <button class="btn btn-reset" onclick="resetAllRecords()">🔄 모든 기록 초기화</button>
        <button class="btn btn-cert" onclick="location.href='/certificate.html'">🏆 상장 출력 화면</button>

        <div style="border-left: 2px solid #ccc; padding-left: 10px; display: flex; align-items: center; gap: 5px;">
            <select id="rankLimitSelect" onchange="updateSettings()" style="padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="3" selected>3위까지</option>
                <option value="4">4위까지</option>
                <option value="5">5위까지</option>
            </select>
            <input type="number" id="seniorYearInput" onchange="updateSettings()" style="width: 60px; padding: 8px; text-align: center;" placeholder="년도">
            <span style="font-size: 0.8rem; color: #666;">년생까지 장년</span>

            <!-- <span style="margin-left: 10px; border-left: 1px solid #ccc; padding-left: 10px;">📡 반경:</span>
            <select id="radiusSelect" onchange="updateRadius()" style="padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="10">10m</option>
                <option value="20" selected>20m</option>
                <option value="30">30m</option>
                <option value="40">40m</option>
                <option value="50">50m</option>
            </select> -->
        </div>
    </div>

    <!-- 지도 영역 -->
    <!-- <div id="map"></div> -->

    <table id="runnerTable">
        <thead>
            <tr>
                <th onclick="sortTable(0)" style="width: 70px;">배번 <span id="sort-icon-0">↕</span></th>
                <th onclick="sortTable(1)">이름 <span id="sort-icon-1">↕</span></th>
                <th onclick="sortTable(2)" style="width: 50px;">성별 <span id="sort-icon-2">↕</span></th>
                <th onclick="sortTable(3)" style="width: 80px;">년생 <span id="sort-icon-3">↕</span></th>
                <th onclick="sortTable(4)">소속 <span id="sort-icon-4">↕</span></th>
                <th onclick="sortTable(5)">연락 <span id="sort-icon-5">↕</span></th>
                <th onclick="sortTable(6)">입금 <span id="sort-icon-6">↕</span></th>
                <th onclick="sortTable(7)">기록 <span id="sort-icon-7">↕</span></th>
                <th onclick="sortTable(8)">기록증 <span id="sort-icon-8">↕</span></th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="runnerList"></tbody>
    </table>

    <!-- 커스텀 알림/모달 요소 -->
    <div id="toastMessage" class="toast-message">알림</div>

    <div id="confirmModal" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="confirmText" class="custom-modal-text">확인하시겠습니까?</div>
            <div class="custom-modal-btns">
                <button class="custom-modal-btn btn-confirm-no" onclick="closeConfirm(false)">취소</button>
                <button class="custom-modal-btn btn-confirm-yes" onclick="closeConfirm(true)">확인</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="alertText" class="custom-modal-text">알림</div>
            <div class="custom-modal-btns">
                <button class="custom-modal-btn btn-alert-ok" onclick="closeAlert()">확인</button>
            </div>
        </div>
    </div>

    <div id="countdownOverlay" class="countdown-overlay">
        <div id="countdownNumber">5</div>
    </div>

    <script>
        const socket = io();
        const currentYear = new Date().getFullYear();
        document.title = `${currentYear} 부천트라이 산악마라톤대회-관리자`;
        document.getElementById('raceTitle').innerText = `🏃${currentYear} 부천트라이 산악마라톤대회-관리자`;
        // 구글 지도 관련 변수 및 함수
        let map, marker;
        let runnerMarkers = {}; // [추가] 선수 마커 관리 객체
        let savedFinishLine = { lat: 37.503, lng: 126.795 }; // 기본값

        // [추가] 커스텀 UI 헬퍼 함수들
        function showToast(msg) {
            const el = document.getElementById('toastMessage');
            el.innerText = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        let confirmCallback = null;
        function showConfirm(msg, onYes, onNo) {
            document.getElementById('confirmText').innerText = msg;
            document.getElementById('confirmModal').style.display = 'flex';
            confirmCallback = (result) => {
                if(result && onYes) onYes();
                else if(!result && onNo) onNo();
            };
        }
        function closeConfirm(result) {
            document.getElementById('confirmModal').style.display = 'none';
            if(confirmCallback) confirmCallback(result);
            confirmCallback = null;
        }

        let alertCallback = null;
        function showAlert(msg, onOk) {
            document.getElementById('alertText').innerText = msg;
            document.getElementById('alertModal').style.display = 'flex';
            alertCallback = onOk;
        }
        function closeAlert() {
            document.getElementById('alertModal').style.display = 'none';
            if(alertCallback) alertCallback();
            alertCallback = null;
        }

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 17,
                center: savedFinishLine,
            });

            marker = new google.maps.Marker({
                position: savedFinishLine,
                map: map,
                title: "골인 지점",
                draggable: true // 마커 드래그 가능
            });

            // 지도 클릭 시
            map.addListener("click", (e) => {
                updateMarkerPosition(e.latLng.lat(), e.latLng.lng());
            });

            // 마커 드래그 종료 시
            marker.addListener("dragend", (e) => {
                updateMarkerPosition(e.latLng.lat(), e.latLng.lng());
            });
        }

        // [추가] DB의 가짜 UTC 시간을 진짜 로컬 시간으로 변환해주는 함수
        function getRealTime(dbDateString) {
            if (!dbDateString) return null;
            return new Date(new Date(dbDateString).getTime() - 9 * 60 * 60 * 1000);
        }

        // [추가] 선수 위치 업데이트 처리
        socket.on('update_runner_map', (data) => {
            if (!map) return;

            const pos = { lat: data.lat, lng: data.lng };
            
            if (runnerMarkers[data.bibNumber]) {
                // 기존 마커 이동
                runnerMarkers[data.bibNumber].setPosition(pos);
            } else {
                // 새 마커 생성 (파란색 아이콘 등 구별 가능하게 설정 가능)
                const newMarker = new google.maps.Marker({
                    position: pos,
                    map: map,
                    optimized: false, // [중요] CSS 클래스 적용을 위해 최적화 끄기
                    // [변경] 마우스 오버 없이 항상 텍스트 표시 (label 사용)
                    label: {
                        text: `${data.name} (${data.bibNumber})`,
                        className: "runner-label" // CSS 클래스 적용
                    },
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 5,
                        fillColor: "#3498db",
                        fillOpacity: 1,
                        strokeWeight: 1,
                        labelOrigin: new google.maps.Point(0, -5) // 배경 박스 크기 고려하여 위치 조정
                    }
                });
                runnerMarkers[data.bibNumber] = newMarker;
            }
        });

        // [추가] SOS 알림 수신 시 지도 이동 및 경고
        socket.on('sos_alert', (data) => {
            showAlert(`🚨${data.name}:${data.phone}(${data.bibNumber})구조요청`);
            if (map) {
                const pos = { lat: data.lat, lng: data.lng };
                map.setCenter(pos);
                map.setZoom(19);
                
                // SOS 마커 (빨간색)
                new google.maps.Marker({
                    position: pos,
                    map: map,
                    title: "SOS 요청 위치",
                    animation: google.maps.Animation.BOUNCE
                });
            }
        });

        function updateMarkerPosition(lat, lng) {
            showConfirm("이 위치를 골인 지점으로 설정하시겠습니까?", () => {
                socket.emit('update_finish_line', { lat, lng });
            }, () => {
                marker.setPosition(savedFinishLine); // 취소 시 원래 위치로 복귀
            });
        }

        // 초기 설정값 수신 및 동기화
        socket.on('current_settings', (data) => {
            if(data.rankLimit) document.getElementById('rankLimitSelect').value = data.rankLimit;
            if(data.seniorYear) document.getElementById('seniorYearInput').value = data.seniorYear;
            //if(data.goalRadius) document.getElementById('radiusSelect').value = data.goalRadius;
            if(data.finishLine) updateMapLocation(data.finishLine);
        });

        socket.on('settings_changed', (data) => {
            if(data.rankLimit) document.getElementById('rankLimitSelect').value = data.rankLimit;
            if(data.seniorYear) document.getElementById('seniorYearInput').value = data.seniorYear;
        });

        socket.on('radius_changed', (val) => {
            //document.getElementById('radiusSelect').value = val;
        });

        socket.on('finish_line_changed', (pos) => {
            updateMapLocation(pos);
            showToast("골인 지점이 변경되었습니다.");
        });

        // [추가] 서버로부터 카운트다운 수신
        socket.on('countdown', (count) => {
            const overlay = document.getElementById('countdownOverlay');
            const num = document.getElementById('countdownNumber');
            
            if (count > 0) {
                overlay.style.display = 'flex';
                num.innerText = count;
            } else {
                overlay.style.display = 'none';
            }
        });

        socket.on('race_status', (data) => {
            if (data.isStarted) {
                document.getElementById('countdownOverlay').style.display = 'none';
            }
        });

        // [추가] UI 업데이트 수신 시 목록 갱신 및 에러 메시지 처리
        socket.on('update_ui', () => fetchRunners());
        socket.on('error_msg', (msg) => showToast(msg));

        function updateMapLocation(pos) {
            savedFinishLine = pos;
            if (map && marker) {
                map.setCenter(pos);
                marker.setPosition(pos);
            }
        }

        function updateSettings() {
            const rankLimit = document.getElementById('rankLimitSelect').value;
            const seniorYear = document.getElementById('seniorYearInput').value;
            socket.emit('update_race_settings', { rankLimit, seniorYear });
            showToast("대회 설정이 저장되었습니다.");
        }

        function updateRadius() {
            const val = document.getElementById('radiusSelect').value;
            socket.emit('update_radius', val);
            showToast("반경 설정이 변경되었습니다.");
        }

        // 1. 직접 접속 차단 로직 (페이지 최상단)
        if (localStorage.getItem('admin_access') !== 'granted') {
            showAlert("잘못된 접근입니다. 메인 페이지에서 비밀번호를 입력하세요.", () => {
                location.href = '/';
            });
        }

        // 시간 포맷 함수 (HH:mm:ss)
        // function formatTime(dateStr, startTimeStr) {
        //     if (!dateStr || !startTimeStr) return "-";
        //     const diff = new Date(dateStr) - new Date(startTimeStr);
        //     if (diff < 0) return "-";
        //     return new Date(diff).toISOString().substr(11, 8);
        // }
        // [수정 후] getRealTime 적용
        function formatTime(finish, start) {
            if (!finish || !start) return "-";
            const diff = getRealTime(finish) - getRealTime(start); // [변경]
            const d = new Date(diff);
            return d.toISOString().substr(11, 8);
        }

        let runnersData = [];

        // 데이터 불러오기
        async function fetchRunners() {
            const res = await fetch('/api/runners');
            runnersData = await res.json();
            renderTable(runnersData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('runnerList');
            
            // [수정] 입력 중인 신규 행(new-runner-row)은 유지하기 위해 잠시 대피
            const newRows = tbody.querySelectorAll('.new-runner-row');
            const fragment = document.createDocumentFragment();
            newRows.forEach(row => fragment.appendChild(row));

            tbody.innerHTML = '';
            tbody.appendChild(fragment); // 대피시켰던 신규 행 복구

            data.forEach(r => {
                const recordStr = formatTime(r.finishTime, r.startTime);
                const row = `<tr id="row-${r.id}">
                    <td><input type="text" value="${r.bibNumber}" onchange="updateField(${r.id}, 'bibNumber', this.value)"></td>
                    <td><input type="text" value="${r.name || ''}" onchange="updateField(${r.id}, 'name', this.value)"></td>
                    <td><input type="text" value="${r.gender || ''}" onchange="updateField(${r.id}, 'gender', this.value)"></td>
                    <td><input type="number" value="${r.birthYear || ''}" onchange="updateField(${r.id}, 'birthYear', this.value)"></td>
                    <td><input type="text" value="${r.affiliation || ''}" onchange="updateField(${r.id}, 'affiliation', this.value)"></td>
                    <td><input type="text" value="${r.phone || ''}" onchange="updateField(${r.id}, 'phone', this.value)"></td>

                    <td>
                        <select onchange="updateField(${r.id}, 'paymentStatus', this.value)" 
                                style="background: ${r.paymentStatus==='Y'?'#d4edda':r.paymentStatus==='F'?'#e2e3e5':'#f8d7da'}">
                            <option value="Y" ${r.paymentStatus==='Y'?'selected':''}>Y (확인)</option>
                            <option value="N" ${r.paymentStatus==='N'?'selected':''}>N (미입금)</option>
                            <option value="F" ${r.paymentStatus==='F'?'selected':''}>F (무료)</option>
                        </select>
                    </td>
                    <td>
                        ${recordStr}
                        ${r.finishTime ? `<button onclick="cancelFinish('${r.bibNumber}')" style="margin-left:5px; color:red; border:none; background:none; cursor:pointer; font-weight:bold;" title="기록 취소">X</button>` : ''}
                    </td> 
                    <td>
                        <span id="print-count-${r.id}">${r.printCount}</span>회
                        ${r.finishTime ? 
                            `<button onclick="printCertificate(${r.id}, '${r.bibNumber}')">🖨️출력</button>` : 
                            `<span style="color:#ccc; font-size:0.8rem;">골인전</span>`
                        }
                    </td>
                    <td><button onclick="deleteRunner(${r.id})" style="color:red; border:none; background:none; cursor:pointer;">❌</button></td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        // 인라인 수정 함수
        async function updateField(id, field, value) {
            const body = {};
            body[field] = field === 'birthYear' ? Number(value) : value;
            
            await fetch(`/api/runners/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            showToast("선수 정보가 수정되었습니다.");
        }

        // 기록증 인쇄 및 카운트 업데이트 함수
        async function printCertificate(id, bib) {
            // 1. 카운트 증가 요청
            const res = await fetch(`/api/runners/${id}/print`, { method: 'POST' });
            const result = await res.json();
            
            // 2. 화면의 카운트 즉시 업데이트
            document.getElementById(`print-count-${id}`).innerText = result.printCount;

            // 3. 기록증 인쇄 팝업 창 열기
            // 설정 패널과 A4 미리보기를 위해 적절한 크기로 팝업을 엽니다.
            const width = 1000;
            const height = 900;
            const left = (window.screen.width - width) / 2;
            const top = (window.screen.height - height) / 2;
            
            window.open(`/certificate_single.html?bib=${bib}`, 'CertificateWindow', 
                `width=${width},height=${height},top=${top},left=${left},scrollbars=yes,resizable=yes`);
        }

        // [추가] 완주 기록 취소 요청
        function cancelFinish(bib) {
            showConfirm(`${bib}번 선수의 완주 기록을 삭제하시겠습니까?`, () => {
                socket.emit('cancel_runner_finish', bib);
            });
        }

        // 기록 초기화 (3가지 칼럼 통합 삭제)
        async function resetAllRecords() {
            showConfirm("모든 선수의 출발, 도착(수동/자동) 기록을 삭제하시겠습니까?", async () => {
                await fetch('/api/runners/reset-records', { method: 'POST' });
                showAlert("초기화되었습니다.");
                fetchRunners();
            });
        }

        // 1. 업로드용 템플릿 다운로드 함수
        function downloadTemplate() {
            const templateData = [
                { bibNumber: "101", name: "홍길동", gender: "남", birthYear: 1980, affiliation: "부천트라이", phone: "010-1234-5678", paymentStatus: "N" }
            ];
            const worksheet = XLSX.utils.json_to_sheet(templateData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
            XLSX.writeFile(workbook, "runner_template.xlsx");
        }

        // 2. 엑셀 파일 읽기 및 서버 전송
        function uploadExcel(input) {
            const file = input.files[0];
            if (!file) return;
            
            document.getElementById('fileName').innerText = file.name;
            const reader = new FileReader();

            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                showConfirm(`${json.length}명의 데이터를 등록하시겠습니까? (배번 중복 시 기존 정보가 업데이트됩니다.)`, async () => {
                    try {
                        const response = await fetch('/api/runners/bulk', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(json)
                        });
                        const result = await response.json();
                        showAlert(result.message);
                        fetchRunners(); // 목록 새로고침
                    } catch (err) {
                        showAlert("업로드 실패: 데이터 형식을 확인해주세요.");
                    }
                });
                input.value = ''; // 파일 입력 초기화
            };
            reader.readAsArrayBuffer(file);
        }

        // 엑셀 다운로드
        function downloadExcel() {
            const exportData = runnersData.map(r => ({
                "배번": r.bibNumber,
                "이름": r.name,
                "성별": r.gender,
                "출생년도": r.birthYear,
                // [수정] formatTime 결과 뒤에 공백(" ")을 덧붙여 엑셀의 자동 시간/날짜 변환을 방지합니다.
                "기록": formatTime(r.finishTime, r.startTime) + " ",
                "연락처": r.phone,
                "소속": r.affiliation,
                "입금": r.paymentStatus
            }));
            const worksheet = XLSX.utils.json_to_sheet(exportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "선수명단");
            XLSX.writeFile(workbook, "trail_runners_final.xlsx");
        }

        // 테이블 정렬
        let currentSortCol = -1;
        let currentSortAsc = true;

        function sortTable(n) {
            // 정렬 방향 및 컬럼 설정
            if (currentSortCol === n) {
                currentSortAsc = !currentSortAsc;
            } else {
                currentSortCol = n;
                currentSortAsc = true;
            }

            // 헤더 아이콘 업데이트
            for (let i = 0; i <= 8; i++) {
                const iconSpan = document.getElementById(`sort-icon-${i}`);
                if (iconSpan) {
                    iconSpan.innerText = (i === n) ? (currentSortAsc ? '▲' : '▼') : '↕';
                    iconSpan.style.color = (i === n) ? '#e74c3c' : '#ccc';
                }
            }

            const sorted = [...runnersData].sort((a, b) => {
                const fields = ['bibNumber', 'name', 'gender', 'birthYear', 'affiliation', 'phone', 'paymentStatus', 'finishTime', 'printCount'];
                let valA = a[fields[n]];
                let valB = b[fields[n]];
                
                if (valA == null) valA = '';
                if (valB == null) valB = '';
                
                // 숫자 비교 (배번, 출생년도, 인쇄수)
                if (n === 0 || n === 3 || n === 8) {
                    valA = Number(valA);
                    valB = Number(valB);
                }

                if (valA < valB) return currentSortAsc ? -1 : 1;
                if (valA > valB) return currentSortAsc ? 1 : -1;
                return 0;
            });
            renderTable(sorted);
        }

        // [기능] 신규 선수 행 추가
        function addNewRow() {
            const tbody = document.getElementById('runnerList');
            const tr = document.createElement('tr');
            tr.className = 'new-runner-row'; // [수정] 신규 행 식별 클래스 추가
            tr.style.background = "#e8f8f5"; // 신규 행 강조 색상
            tr.innerHTML = `
                <td><input type="text" placeholder="배번" class="new-bib"></td>
                <td><input type="text" placeholder="이름" class="new-name"></td>
                <td><input type="text" placeholder="성별" class="new-gender"></td>
                <td><input type="number" placeholder="년도" class="new-birth"></td>
                <td><input type="text" placeholder="소속" class="new-affil"></td>
                <td><input type="text" placeholder="연락처" class="new-phone"></td>
                <td>
                    <select class="new-payment">
                        <option value="N">N (미입금)</option>
                        <option value="Y">Y (확인)</option>
                        <option value="F">F (무료)</option>
                    </select>
                </td>
                <td>-</td>
                <td>-</td>
                <td>
                    <button onclick="saveNewRunner(this)" class="btn" style="background:#2ecc71; padding:5px 10px; font-size:0.8rem;">💾 저장</button>
                    <button onclick="this.closest('tr').remove()" class="btn" style="background:#95a5a6; padding:5px 10px; font-size:0.8rem;">❌ 취소</button>
                </td>
            `;
            tbody.prepend(tr); // 최상단에 추가
        }

        // [기능] 신규 선수 저장
        async function saveNewRunner(btn) {
            const tr = btn.closest('tr');
            const bib = tr.querySelector('.new-bib').value;
            const name = tr.querySelector('.new-name').value;

            if(!bib || !name) return showToast("배번과 이름은 필수입니다.");

            const newRunner = {
                bibNumber: bib,
                name: name,
                gender: tr.querySelector('.new-gender').value,
                birthYear: tr.querySelector('.new-birth').value,
                affiliation: tr.querySelector('.new-affil').value,
                phone: tr.querySelector('.new-phone').value,
                paymentStatus: tr.querySelector('.new-payment').value
            };

            try {
                // 기존 Bulk API 재사용 (배열로 전송)
                const response = await fetch('/api/runners/bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([newRunner])
                });
                const result = await response.json();
                showToast("저장되었습니다.");
                tr.remove(); // 입력 행 삭제
                fetchRunners(); // 목록 갱신
            } catch (err) {
                console.error(err);
                showAlert("저장 실패: 배번 중복 등을 확인해주세요.");
            }
        }

        // [추가] 선수 삭제 함수
        function deleteRunner(id) {
            showConfirm("정말 삭제하시겠습니까?", async () => {
                try {
                    await fetch(`/api/runners/${id}`, { method: 'DELETE' });
                    showToast("삭제되었습니다.");
                    
                    // [변경] 전체 리로드 대신 해당 행만 삭제
                    const row = document.getElementById(`row-${id}`);
                    if (row) row.remove();
                    
                    // 데이터 배열에서도 제거 (정렬 시 재등장 방지)
                    runnersData = runnersData.filter(r => r.id !== id);
                } catch (err) {
                    console.error(err);
                    showAlert("삭제 실패");
                }
            });
        }

        fetchRunners();
    </script>
</body>
</html>
